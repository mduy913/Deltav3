<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>DELTA PROXY - V84 OMNI</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #050508; --cyan: #00f2ff; --gold: #ffcc00; --card: #11111d; --red: #ff3131; --border: #2a2a3a; --vip: #ff00ff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 10px; font-size: 13px; }
        .box { background: var(--card); border-radius: 16px; border: 1px solid var(--border); padding: 15px; margin-bottom: 12px; }
        h4 { margin: 0 0 10px 0; color: var(--cyan); text-transform: uppercase; font-size: 14px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 4px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; outline: none; }
        button { border: none; padding: 12px; border-radius: 8px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 11px; }
        button:disabled { opacity: 0.2; }
        .btn-main { background: linear-gradient(135deg, var(--cyan), #0088ff); color: #000; width: 100%; }
        .btn-gold { background: linear-gradient(135deg, var(--gold), #ff8800); color: #000; width: 100%; }
        .btn-red { background: var(--red); color: #fff; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
        #adm-toggle { position: fixed; width: 55px; height: 55px; background: var(--red); border-radius: 50%; border: 3px solid #fff; z-index: 1000; display: none; align-items: center; justify-content: center; box-shadow: 0 0 15px var(--red); }
        #adm-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1001; display: none; overflow-y: auto; padding: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 10px; }
        td, th { padding: 6px 3px; border-bottom: 1px solid #1a1a2a; text-align: left; }
        .badge-vip { background: var(--vip); color: #fff; padding: 1px 4px; border-radius: 3px; font-size: 8px; }
        .scroll-v { max-height: 200px; overflow-y: auto; border: 1px solid #222; border-radius: 5px; padding: 5px; }
    </style>
</head>
<body>

    <div id="maint-msg" style="display:none; text-align:center; padding-top:150px;">
        <h1 style="color:var(--red)">SHOP ĐANG BẢO TRÌ</h1>
        <p>Sếp đang dọn dẹp, vui lòng quay lại sau!</p>
    </div>

    <div id="auth-ui" style="max-width:380px; margin:50px auto;">
        <div class="box" style="text-align:center">
            <h2 style="color:var(--cyan); margin-bottom:20px">DELTA PROXY</h2>
            <input type="text" id="au" placeholder="Tài khoản">
            <input type="password" id="ap" placeholder="Mật khẩu">
            <button class="btn-main" onclick="auth('login')">Vào Cửa Hàng</button>
            <button style="background:none; color:#555; margin-top:10px" onclick="auth('reg')">Chưa có tài khoản? Đăng ký</button>
        </div>
    </div>

    <div id="adm-toggle" onmousedown="dragStart(event)" ontouchstart="dragStart(event)">⚙️</div>

    <div id="adm-modal">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
            <h3 style="color:var(--red); margin:0">BẢNG ĐIỀU KHIỂN BOSS</h3>
            <button onclick="document.getElementById('adm-modal').style.display='none'" class="btn-red" style="padding:4px 12px">ĐÓNG</button>
        </div>

        <div class="box">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px">
                <span>Tổng nạp: <b id="adm-total-bank" style="color:var(--gold)">0</b>đ</span>
                <button id="btn-status" onclick="toggleShop()" style="padding:4px 10px"></button>
            </div>
            
            <div id="adm-price-rows"></div> 
            
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px">
                <div><small>Quay Thường</small><input type="number" id="adm-p-roll"></div>
                <div><small>Quay VIP</small><input type="number" id="adm-v-roll"></div>
            </div>
            <div style="margin-top:5px"><small>Tỉ lệ trúng (%)</small><input type="number" id="adm-rate"></div>
            <button class="btn-main" onclick="saveSettings()" style="margin-top:10px">CẬP NHẬT HỆ THỐNG</button>
        </div>

        <div class="box">
            <h4>KIỂM SOÁT USER</h4>
            <div class="scroll-v"><table><tbody id="adm-user-list"></tbody></table></div>
        </div>

        <div class="box">
            <h4>DUYỆT NẠP</h4>
            <div id="adm-pay-list"></div>
        </div>

        <div class="box">
            <h4>LỊCH SỬ BÁN KEY (TOÀN SHOP)</h4>
            <div class="scroll-v"><table><thead><tr><th>User</th><th>Nội dung</th><th>Lúc</th></tr></thead><tbody id="adm-all-sales"></tbody></table></div>
        </div>
    </div>

    <div id="shop-ui" style="display:none; max-width:500px; margin:auto;">
        <div class="box">
            <div style="display:flex; justify-content:space-between">
                <span><b id="u-id"></b> <span id="vip-tag"></span></span>
                <span>Ví: <b id="u-bl" style="color:var(--gold)">0</b>đ</span>
            </div>
            <input type="number" id="n-amt" placeholder="Số tiền nạp (Min 1k)...">
            <button class="btn-gold" onclick="nap()">NẠP TIỀN QUA NGÂN HÀNG</button>
            <div id="qr-display" style="display:none; text-align:center; background:#fff; color:#000; padding:15px; border-radius:15px; margin-top:10px">
                <img id="qr-img" style="width:180px">
                <p id="txt-nd" style="color:red; font-weight:bold; font-size:16px"></p>
                <button class="btn-main" onclick="confirmNap()">ĐÃ CHUYỂN TIỀN</button>
            </div>
        </div>

        <div class="box">
            <h4>GÓI KEY ĐANG BÁN</h4>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px" id="shop-items"></div>
        </div>

        <div class="box">
            <h4>VÒNG QUAY MAY MẮN</h4>
            <div class="grid-4" style="grid-template-columns: repeat(3, 1fr);">
                <button class="btn-gold shop-btn" onclick="roll('tuan')">QUAY TUẦN</button>
                <button class="btn-gold shop-btn" onclick="roll('thang')">QUAY THÁNG</button>
                <button class="btn-gold shop-btn" onclick="roll('nam')">QUAY NĂM</button>
            </div>
            <div id="roll-res" style="text-align:center; margin-top:10px; color:var(--cyan); font-weight:bold"></div>
        </div>

        <div class="box">
            <h4>LỊCH SỬ CỦA BẠN</h4>
            <div class="scroll-v"><table><tbody id="h-list"></tbody></table></div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://shopmduy-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let curU, curUID, settings = {}, shopOpen = true, isVIP = false;

    function auth(type) {
        const u = document.getElementById('au').value.trim().toLowerCase(), p = document.getElementById('ap').value;
        if(!u || !p) return;
        if(type === 'reg') {
            db.ref('users/'+u).set({password:p, balance:0, role:'user', isVIP:false, uid:"U"+Date.now()}).then(()=>alert("Đăng ký thành công!"));
        } else {
            db.ref('users/'+u).once('value', s => {
                const d = s.val();
                if(d && d.password === p) {
                    curU = u; curUID = d.uid;
                    db.ref('system/open').on('value', st => {
                        shopOpen = st.val();
                        if(!shopOpen && d.role !== 'admin') {
                            document.getElementById('maint-msg').style.display='block';
                            document.getElementById('auth-ui').style.display='none';
                        } else {
                            document.getElementById('auth-ui').style.display='none';
                            document.getElementById('shop-ui').style.display='block';
                            document.getElementById('u-id').innerText = u.toUpperCase();
                            if(d.role === 'admin') { document.getElementById('adm-toggle').style.display='flex'; initAdmin(); }
                            db.ref('users/'+u).on('value', us => {
                                const ud = us.val(); isVIP = ud.isVIP;
                                document.getElementById('u-bl').innerText = (ud.balance||0).toLocaleString();
                                document.getElementById('vip-tag').innerHTML = isVIP ? '<span class="badge-vip">V.I.P</span>' : '';
                                renderShop();
                            });
                        }
                    });
                } else alert("Sai thông tin!");
            });
        }
    }

    function renderShop() {
        const items = ['ngay', 'tuan', 'thang', 'nam'];
        const container = document.getElementById('shop-items'); container.innerHTML = "";
        items.forEach(t => {
            const price = isVIP ? (settings['v_'+t]||0) : (settings['p_'+t]||0);
            db.ref('key_store/'+t).on('value', s => {
                const count = s.numChildren();
                const btn = document.createElement('button');
                btn.className = "btn-main shop-btn";
                btn.disabled = !shopOpen;
                btn.innerHTML = `${t.toUpperCase()} (${count})<br><small>${price.toLocaleString()}đ</small>`;
                btn.onclick = () => buy(t, price);
                container.appendChild(btn);
            });
        });
        db.ref('history_pay/'+curUID).on('value', h => {
            const t = document.getElementById('h-list'); t.innerHTML = "";
            h.forEach(c => { const i = c.val(); t.innerHTML = `<tr><td>${i.time}</td><td><b>${i.status}</b></td></tr>` + t.innerHTML; });
        });
    }

    function buy(t, p) {
        db.ref('users/'+curU+'/balance').once('value', s => {
            let b = s.val() || 0; if(b < p) return alert("Hết tiền!");
            db.ref('key_store/'+t).limitToFirst(1).once('value', snap => {
                if(!snap.exists()) return alert("Hết hàng!");
                db.ref('users/'+curU+'/balance').set(b - p);
                let kID = Object.keys(snap.val())[0], kV = snap.val()[kID];
                db.ref('key_store/'+t+'/'+kID).remove();
                const log = {time:new Date().toLocaleString(), status:kV, user:curU};
                db.ref('history_pay/'+curUID).push(log);
                db.ref('system/all_sales').push(log);
            });
        });
    }

    function roll(t) {
        const p = isVIP ? settings.v_roll : settings.p_roll;
        db.ref('users/'+curU+'/balance').once('value', s => {
            let b = s.val() || 0; if(b < p) return alert("Hết tiền!");
            db.ref('users/'+curU+'/balance').set(b - p);
            document.getElementById('roll-res').innerText = "⌛...";
            setTimeout(() => {
                if(Math.floor(Math.random()*100) < settings.rate) {
                    db.ref('key_store/'+t).limitToFirst(1).once('value', snap => {
                        if(!snap.exists()) return document.getElementById('roll-res').innerText = "Hết key!";
                        let kID = Object.keys(snap.val())[0], kV = snap.val()[kID];
                        db.ref('key_store/'+t+'/'+kID).remove();
                        const log = {time:new Date().toLocaleString(), status:kV, user:curU};
                        db.ref('history_pay/'+curUID).push(log);
                        db.ref('system/all_sales').push(log);
                        document.getElementById('roll-res').innerText = "🎉 " + kV;
                    });
                } else document.getElementById('roll-res').innerText = "🧨 Hụt!";
            }, 800);
        });
    }

    function initAdmin() {
        document.getElementById('adm-toggle').onclick = () => document.getElementById('adm-modal').style.display='block';
        db.ref('system/open').on('value', s => {
            const btn = document.getElementById('btn-status');
            btn.innerText = s.val() ? "MỞ CỬA" : "ĐÓNG CỬA";
            btn.style.background = s.val() ? "var(--cyan)" : "var(--red)";
        });
        db.ref('system/total_bank').on('value', s => document.getElementById('adm-total-bank').innerText = (s.val()||0).toLocaleString());
        db.ref('system/settings').on('value', s => {
            settings = s.val() || {};
            const items = ['ngay', 'tuan', 'thang', 'nam'];
            const container = document.getElementById('adm-price-rows'); container.innerHTML = "";
            items.forEach(t => {
                container.innerHTML += `<div style="display:flex; gap:3px; margin-bottom:4px">
                    <input type="number" id="adm-p-${t}" value="${settings['p_'+t]||0}" title="Thường">
                    <input type="number" id="adm-v-${t}" value="${settings['v_'+t]||0}" title="VIP">
                    <button onclick="clearKho('${t}')" style="background:#444; padding:0 8px; font-size:9px">X</button>
                </div>`;
            });
            document.getElementById('adm-p-roll').value = settings.p_roll || 0;
            document.getElementById('adm-v-roll').value = settings.v_roll || 0;
            document.getElementById('adm-rate').value = settings.rate || 0;
        });
        db.ref('bank_requests').on('value', s => {
            const l = document.getElementById('adm-pay-list'); l.innerHTML = "";
            s.forEach(c => { const r = c.val(); 
                l.innerHTML += `<div class="box" style="padding:8px; display:flex; justify-content:space-between; font-size:11px">
                <span>${r.user}: ${r.amount}đ</span>
                <div><button onclick="duyet('${r.user}', ${r.amount}, '${c.key}')" style="background:var(--cyan); padding:3px 8px">D</button> <button onclick="db.ref('bank_requests/${c.key}').remove()" style="background:var(--red); padding:3px 8px">X</button></div></div>`;
            });
        });
        db.ref('users').on('value', s => {
            const l = document.getElementById('adm-user-list'); l.innerHTML = "<tr><th>Tên</th><th>V</th><th>Ví</th><th>Sửa</th></tr>";
            s.forEach(c => { const u = c.val();
                l.innerHTML += `<tr>
                    <td>${c.key}</td>
                    <td><input type="checkbox" ${u.isVIP?'checked':''} onchange="db.ref('users/${c.key}/isVIP').set(this.checked)"></td>
                    <td>${(u.balance||0).toLocaleString()}</td>
                    <td><input type="number" id="edit-bl-${c.key}" style="width:50px; padding:2px; margin:0"> <button onclick="db.ref('users/${c.key}/balance').set(Number(document.getElementById('edit-bl-${c.key}').value))">✔</button></td>
                </tr>`;
            });
        });
        db.ref('system/all_sales').limitToLast(50).on('value', s => {
            const t = document.getElementById('adm-all-sales'); t.innerHTML = "";
            s.forEach(c => { const i = c.val(); t.innerHTML = `<tr><td>${i.user}</td><td>${i.status}</td><td>${i.time.split(',')[1]}</td></tr>` + t.innerHTML; });
        });
    }

    function duyet(u, a, k) {
        db.ref('users/'+u+'/balance').transaction(v => (v||0)+a);
        db.ref('system/total_bank').transaction(v => (v||0)+a);
        db.ref('bank_requests/'+k).remove();
    }
    function toggleShop() { db.ref('system/open').set(!shopOpen); }
    function clearKho(t) { if(confirm("Xoá sạch kho "+t+"?")) db.ref('key_store/'+t).remove(); }
    function saveSettings() {
        const items = ['ngay', 'tuan', 'thang', 'nam']; let upd = {
            p_roll: Number(document.getElementById('adm-p-roll').value),
            v_roll: Number(document.getElementById('adm-v-roll').value),
            rate: Number(document.getElementById('adm-rate').value)
        };
        items.forEach(t => { 
            upd['p_'+t] = Number(document.getElementById('adm-p-'+t).value);
            upd['v_'+t] = Number(document.getElementById('adm-v-'+t).value);
        });
        db.ref('system/settings').update(upd).then(()=>alert("Đã lưu!"));
    }
    function nap() {
        const amt = Number(document.getElementById('n-amt').value); if(amt<1000) return alert("Min 1k");
        const nd = `NAP ${curU.toUpperCase()}`;
        document.getElementById('qr-img').src = `https://img.vietqr.io/image/mbbank-0588807300000-compact2.png?amount=${amt}&addInfo=${nd}`;
        document.getElementById('txt-nd').innerText = nd;
        document.getElementById('qr-display').style.display='block';
        db.ref('bank_requests').push({user:curU, amount:amt});
    }
    function confirmNap() { alert("Đã gửi, sếp duyệt nhé!"); document.getElementById('qr-display').style.display='none'; }

    let offset=[0,0], isDown=false, el=document.getElementById('adm-toggle');
    function dragStart(e) { isDown=true; let x=e.clientX||e.touches[0].clientX, y=e.clientY||e.touches[0].clientY; offset=[el.offsetLeft-x, el.offsetTop-y]; }
    document.addEventListener('mousemove', e => { if(!isDown)return; let x=e.clientX, y=e.clientY; el.style.left=(x+offset[0])+'px'; el.style.top=(y+offset[1])+'px'; });
    document.addEventListener('touchmove', e => { if(!isDown)return; let x=e.touches[0].clientX, y=e.touches[0].clientY; el.style.left=(x+offset[0])+'px'; el.style.top=(y+offset[1])+'px'; });
    document.addEventListener('mouseup', ()=>isDown=false); document.addEventListener('touchend', ()=>isDown=false);
</script>
</body>
</html>
